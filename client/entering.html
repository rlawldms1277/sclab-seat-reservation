<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="title">입실 확인 - SCLab</title>
  <link rel="stylesheet" href="css/entering.css" />
</head>
<body>
  <!-- 상단 네비게이션 -->
  <header class="navbar">
    <div class="logo">SClab</div>

    <!-- 우측 컨트롤: 위 user-info, 아래 nav -->
    <div class="right-controls">
      <div class="user-info" id="user-info">
        <!-- 로그인 시 JS에서 여기에 이름과 로그아웃 버튼 생성 -->
      </div>

      <nav class="main-nav">
        <a href="login.html" data-i18n="login">로그인</a>
        <span class="divider">|</span>
        <a href="signup.html" data-i18n="signup">회원가입</a>
      </nav>
    </div>
  </header>

  <!-- 본문 -->
  <main class="entering-wrap">
    <h2 class="page-title" data-i18n="enterTitle">입실 번호 입력</h2>

    <form class="entering-form" action="#" method="post">
      <!-- PIN 입력 -->
      <div class="row">
        <div class="label-pill">PIN</div>
        <div class="input-pill">
          <input 
            type="password" 
            placeholder="입력해주세요." 
            data-i18n-placeholder="enterPin" 
          />
        </div>
      </div>

      <!-- 버튼 -->
      <div class="actions">
        <button type="submit" class="btn-enter" data-i18n="confirmBtn">확인</button>
      </div>
    </form>

    <!-- 안내 문구 -->
    <div class="notice">
      <p data-i18n="rule1">
        입실 시 4시간동안 사용가능합니다. (ex 9:00 선택 시, 12:59분 자동 퇴실)
      </p>
    </div>

    <!-- 언어 전환 버튼 -->
    <div class="lang-switch">
      <button id="btn-lang">English</button>
    </div>
  </main>

  <!-- 번역 스크립트 -->
  <script>
    const translations = {
      en: {
        title: "Enter - SCLab",
        login:"login",
        signup:"signup",
        enterTitle: "Enter PIN Number",
        enterPin: "Please enter your PIN.",
        confirmBtn: "Confirm",
        rule1: "You can use the room for 4 hours upon check-in. (Ex. If you select 9:00, automatic check-out will occur at 12:59.)"
      },
      ko: {
        title: "입실 확인 - SCLab",
        login:"로그인",
        signup:"회원가입",
        enterTitle: "입실 번호 입력",
        enterPin: "입력해주세요.",
        confirmBtn: "확인",
        rule1: "입실 시 4시간동안 사용가능합니다. (ex 9:00 선택 시, 12:59분 자동 퇴실)"
      }
    };

    let currentLang = "ko";

    document.getElementById("btn-lang").addEventListener("click", () => {
      currentLang = currentLang === "ko" ? "en" : "ko";

      // data-i18n 번역 적용
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.textContent = translations[currentLang][key];
      });

      // placeholder 번역 적용
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        const key = el.getAttribute("data-i18n-placeholder");
        el.placeholder = translations[currentLang][key];
      });

      // 버튼 텍스트 전환
      document.getElementById("btn-lang").textContent =
        currentLang === "ko" ? "English" : "한국어";

      // <title>도 변경
      document.title = translations[currentLang]["title"];
    });
  </script>

  <script type="module">
    import { renderLoggedInUser, requireLogin } from "./js/user.js";
    import "./js/checkout.js";
    import { showRemainingTime } from "./js/timer.js";

    document.addEventListener("DOMContentLoaded", () => {       
      renderLoggedInUser(); // ✅ 로그인 표시 (header 영역)

      // ✅ 내 예약 불러오기
      const myReservation = JSON.parse(localStorage.getItem("myReservation") || "null");
      if (myReservation && myReservation.endTime) {
        // checkout 페이지의 퇴실 폼 위에만 표시
        showRemainingTime(myReservation, ".checkout-form");  
      }
    });
  </script>
  <script type="module" src="./js/entering.js"></script>
</body>
</html>
