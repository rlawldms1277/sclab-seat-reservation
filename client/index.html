<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCLab 자리 예약 시스템</title>
  <!-- 외부 CSS 연결 -->
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <script src="js/index.js"></script>
  <div class="container">
    <h1>S C L a b</h1>
    <p data-i18n="subtitle">자리 예약 시스템</p>

    <!-- 로그인 상태 영역 (빈 div, JS가 내부를 채움) -->
    <div class="user-info" id="user-info"></div>

    <!-- 기본 액션 버튼들 (JS가 비로그인 상태일 때 보여줄 수 있음) -->
    <div id="default-actions" style="margin-top:16px;">
      <button onclick="location.href='login.html'" data-i18n="login">로그인</button>
      <button onclick="location.href='entering.html'" data-i18n="enter">입실</button>
      <button onclick="location.href='checkout.html'" data-i18n="checkout">퇴실</button>
      <button onclick="location.href='viewseats.html'" data-i18n="viewSeats">좌석 현황 확인</button>
      <button onclick="location.href='signup.html'" data-i18n="signup">회원가입</button>
    </div>

    <!-- 언어 전환 버튼 (style 문법으로 수정) -->
    <div style="margin-top:20px;">
      <button id="btn-lang">English</button>
    </div>
  </div>

  <script>
    // 번역 데이터
    const translations = {
      en: {
        subtitle: "Seat Reservation System",
        login: "Login",
        enter: "Enter",
        checkout: "Checkout",
        signup: "Sign Up",
        viewSeats: "Check Available Seats",
        loggedAs: "Logged in as",
        logout: "Logout"
      },
      ko: {
        subtitle: "자리 예약 시스템",
        login: "로그인",
        enter: "입실",
        checkout: "퇴실",
        signup: "회원가입",
        viewSeats: "좌석 현황 확인",
        loggedAs: "님",
        logout: "로그아웃"
      }
    };

    let currentLang = "ko";

    // 언어 토글 버튼
    document.getElementById("btn-lang").addEventListener("click", () => {
      currentLang = currentLang === "ko" ? "en" : "ko";
      applyTranslations();
      document.getElementById("btn-lang").textContent = currentLang === "ko" ? "English" : "한국어";
    });

    // 번역 적용 함수 (문서 전체 data-i18n 요소들)
    function applyTranslations() {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (translations[currentLang] && translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });
    }

  </script>

    <!-- ✅ user.js 불러오기 (공통 로그인 표시/로그아웃) -->
  <script type="module">
    import { renderLoggedInUser, requireLogin } from "./js/user.js";
    import "./js/checkout.js";
    import { showRemainingTime } from "./js/timer.js";

    document.addEventListener("DOMContentLoaded", () => {      
      renderLoggedInUser(); // ✅ 로그인 표시 (header 영역)

      // ✅ 내 예약 불러오기
      const myReservation = JSON.parse(localStorage.getItem("myReservation") || "null");
      if (myReservation && myReservation.endTime) {
        // checkout 페이지의 퇴실 폼 위에만 표시
        showRemainingTime(myReservation, ".checkout-form");  
      }
    });
  </script>
  </body>
</html>
