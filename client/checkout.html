<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="title">퇴실 신청 - SCLab</title>
  <link rel="stylesheet" href="css/checkout.css" />
  <link rel="stylesheet" href="css/common.css" />
  
</head>
<body>
  <!-- 상단 네비게이션 -->
  <header class="navbar">
    <div class="logo">SClab</div>

    <!-- 우측 컨트롤: 위 user-info, 아래 nav -->
    <div class="right-controls">
      <div class="user-info" id="user-info">
        <!-- 로그인 시 JS에서 여기에 이름과 로그아웃 버튼 생성 -->
      </div>

      <nav class="main-nav">
        <a href="index.html" data-i18n="main">Main</a>
        <span class="divider">|</span>
        <a href="login.html" data-i18n="login">로그인</a>
        <span class="divider">|</span>
        <a href="signup.html" data-i18n="signup">회원가입</a>
      </nav>
    </div>
  </header>

  <!-- 본문 -->
  <main class="checkout-wrap">
    <h2 class="page-title" data-i18n="checkoutTitle">퇴실 신청</h2>

    <form class="checkout-form" action="#" method="post">
      <!-- PIN 입력 -->
      <div class="row">
        <div class="label-pill" data-i18n="pw">PW</div>
        <div class="input-pill">
          <input 
            type="password" 
            placeholder="입력해주세요." 
            data-i18n-placeholder="enterPw"
          />
        </div>
      </div>

      <!-- 버튼 -->
      <div class="actions">
        <button type="submit" class="btn-checkout" data-i18n="checkoutBtn">퇴실하기</button>
      </div>
    </form>

    <!-- ✅ 안내 문구 -->
    <div class="notice">
      <p data-i18n="checkoutNotice">퇴실 시 재입실이 불가능합니다.</p>
    </div>

    <!-- 언어 전환 버튼 -->
    <div class="lang-switch">
      <button id="btn-lang">English</button>
    </div>
  </main>

  <!-- 번역 스크립트 -->
  <script>
    const translations = {
      en: {
        title: "Checkout - SCLab",
        main :"Main",
        login : "Login",
        signup : "Signup",
        checkoutTitle: "Checkout Request",
        pw: "PW",
        enterPw: "Please enter your password.",
        checkoutBtn: "Checkout",
        checkoutNotice: "Re-entry is not allowed after checkout."
      },
      ko: {
        title: "퇴실 신청 - SCLab",
        main :"Main",
        login : "Login",
        signup : "Signup",
        checkoutTitle: "퇴실 신청",
        pw: "PW",
        enterPw: "입력해주세요.",
        checkoutBtn: "퇴실하기",
        checkoutNotice: "퇴실 시 재입실이 불가능합니다."
      }
    };

    let currentLang = "ko";

    document.getElementById("btn-lang").addEventListener("click", () => {
      currentLang = currentLang === "ko" ? "en" : "ko";

      // data-i18n 변경
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.textContent = translations[currentLang][key];
      });

      // placeholder 번역
      document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        const key = el.getAttribute("data-i18n-placeholder");
        el.placeholder = translations[currentLang][key];
      });

      // 버튼 텍스트 전환
      document.getElementById("btn-lang").textContent =
        currentLang === "ko" ? "English" : "한국어";

      // <title>도 변경
      document.title = translations[currentLang]["title"];
    });
  </script>

  <!-- ✅ user.js + checkout.js 불러오기 -->
  <script type="module">
    import { renderLoggedInUser, requireLogin } from "./js/user.js";
    import "./js/checkout.js";
    import { showRemainingTime } from "./js/timer.js";

    document.addEventListener("DOMContentLoaded", () => {     
      renderLoggedInUser(); // ✅ 로그인 표시 (header 영역)

      // ✅ 내 예약 불러오기
      const myReservation = JSON.parse(localStorage.getItem("myReservation") || "null");
      if (myReservation && myReservation.endTime) {
        // checkout 페이지의 퇴실 폼 위에만 표시
        showRemainingTime(myReservation, ".checkout-form");  
      }
    });
  </script>
</body>
</html>
